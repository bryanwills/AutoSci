# scievolve.yaml - Proposal-first evolution contract.
#
# SciEvolve converts feedback signals from user, task, and open environments
# into inspectable proposals for three dimensions:
#   memory        -> /dream
#   workflow      -> /forge
#   orchestration -> /morph
#
# This file documents the on-disk contract used by
# `tools/research_wiki.py scievolve-*`. It is intentionally append-friendly
# JSONL so agents and automation can inspect the evolution loop directly.

storage:
  root: wiki/outputs/evolution/
  signals: wiki/outputs/evolution/signals.jsonl
  proposal_index: wiki/outputs/evolution/proposals.jsonl
  proposal_artifacts: wiki/outputs/evolution/proposals/
  applications: wiki/outputs/evolution/applications.jsonl
  reports: wiki/outputs/evolution/reports/
  dream_runs: wiki/outputs/evolution/dream/
  forge_runs: wiki/outputs/evolution/forge/
  morph_runs: wiki/outputs/evolution/morph/

architecture_boundary:
  agent_boundary:
    - configured LLM policy runtime
    - SciFlow slash skills
    - deterministic Python tools
    - SciMem wiki state
    - SciDAG templates and operator prompts
  policy_runtime_role: semantic proposal and prioritization inside the AutoSci
    agent boundary; replaceable across Claude Code, OpenAI-compatible APIs,
    local models, or supplied agent-response JSON
  policy_runtime_rationale: replaceability is a verifiability feature; it keeps
    the semantic reasoning layer model-agnostic while deterministic validation
    and apply semantics remain stable
  deterministic_tool_role: sensing, context construction, evidence validation,
    guarded apply, provenance ledgers, and downstream context rebuilds
  mutation_surface_note: self-evolution targets typed behavioral surfaces that
    downstream workflows consume, not arbitrary source-code rewrites
  mutation_surface_rationale: scoped mutation is the safe and meaningful unit of
    agent evolution because it changes future memory retrieval, skill behavior,
    or DAG execution without unbounded self-modification risk
  automatic_mutation_surfaces:
    - SciEvolve memory metadata and append-only memory notes
    - SciFlow skill protocols and skill-level provenance
    - SciDAG templates and operator prompts when apply is explicitly enabled
  higher_risk_path:
    - core runtime source code
    - runtime schemas
    - broad repository rewrites

signal:
  required_fields:
    id: stable signal id
    timestamp: UTC ISO-8601 timestamp
    source: user | task | open
    dimension: memory | workflow | orchestration
    skill: /dream | /forge | /morph
    target: entity slug, skill name, DAG/template name, or blank
    kind: correction | failure | warning | success | cost | review | experiment | external-update | other
    summary: short human-readable signal summary
    confidence: low | medium | high
    severity: info | low | medium | high | critical
    status: recorded
  optional_fields:
    evidence_path: path to supporting artifact
    evidence_text: short supporting quote or note
  injection_paths:
    skill_explicit: skills call tools/scievolve_record.py at end of execution
    manual_cli: human calls tools/research_wiki.py scievolve-record-signal
    automatic_sensing: tools/research_wiki.py scievolve-sense records durable
      failed entity states, workflow log failures, and dream/forge apply skips
  dedupe:
    field: dedupe_key
    behavior: automatic sensing and other idempotent callers skip an existing
      signal with the same dedupe_key

patterns:
  recurring_window_days: 30
  recurring_thresholds:
    medium_plus_signals: 3
    high_or_critical_signals: 2
  grouping: dimension + target + kind
  consumed_by:
    - /dream context recurring_patterns
    - /forge context recurring_patterns
    - /morph context recurring_patterns

proposal:
  required_fields:
    id: deterministic proposal id for a signal group
    created_at: UTC ISO-8601 timestamp
    dimension: memory | workflow | orchestration
    skill: /dream | /forge | /morph
    target: target inherited from the signal group
    triggering_signals: list of signal ids
    proposed_action: proposal-first update description
    rationale: why the signals justify review
    risk: risk / apply caution
    status: proposed | approved | applied | rejected | superseded
    output_path: Markdown artifact path
    json_path: JSON artifact path
  optional_fields:
    proposal_kind: forgetting | consolidation | association | review
    confidence: low | medium | high
    related_entities: list of cited context entity ids involved in the proposal
    evidence: list of cited signal/entity/candidate/edge evidence records
    agent_trace: prompt/response/model metadata for agent-mediated proposals
    application: application event when status is applied

dream:
  mode: agent-first
  artifacts:
    context_json: wiki/outputs/evolution/dream/<run>/dream_context.json
    context_markdown: wiki/outputs/evolution/dream/<run>/dream_context.md
    agent_prompt: wiki/outputs/evolution/dream/<run>/dream_agent_prompt.md
    agent_response: wiki/outputs/evolution/dream/<run>/dream_agent_response.json
    report: wiki/outputs/evolution/dream/<run>/dream_report.md
    apply_report_json: wiki/outputs/evolution/dream/<run>/dream_apply_report.json
    apply_report_markdown: wiki/outputs/evolution/dream/<run>/dream_apply_report.md
  contract:
    - deterministic tooling prepares memory cues only
    - a pluggable policy runtime chooses forgetting, consolidation, and
      association proposals
    - supported policy runtimes include Claude Code, OpenAI-compatible API
      models, local models, or supplied agent-response JSON
    - context includes recurring memory signal patterns in addition to recent
      individual signals and deterministic memory cues
    - validation requires cited context evidence before writing proposals
    - safe auto-apply can apply medium/high-confidence proposals as reversible
      SciEvolve metadata and append-only audit notes on memory pages
    - safe applications rebuild wiki/graph/context_brief.md so later skills can
      consume applied memory guidance
    - "applied memory metadata affects compile-context ranking and folding:
      downweighted pages are deprioritized, consolidation sources are folded
      into canonical targets, and associations appear in guidance"
    - default safe apply does not rewrite page bodies; explicit yolo can merge
      or archive pages for high-confidence proposals
    - graph edges, skills, schemas, and templates remain untouched
  automation:
    workflow: .github/workflows/dream.yml
    config: config/dream.yml
    schedule: "43 18 * * *"
    scheduled_yolo: user-configurable through config/dream.yml; manual dispatch
      inputs override config for a single run
    writeback: commits wiki/ dream artifacts, proposal/application ledgers,
      safe memory mutations, and rebuilt context_brief.md
    policy_runtime_gate: fail closed unless Claude Code Action auth or
      OpenAI-compatible LLM env is available
    automatic_sensing: scievolve-sense runs before context preparation
    claude_write_boundary: reject pre-finalization edits outside the generated
      response file; finalize the same prepared run with --run-dir
    staging: force-stage only finalizer-declared paths because generated wiki
      outputs are ignored by default
  signal_collection:
    - after run, record task signal if high rejection rate or user correction
    - propose-only runs benefit most: signals capture unapplied findings

forge:
  mode: agent-first
  default_behavior: apply validated skill patches; --dry-run keeps proposals
    review-only
  artifacts:
    context_json: wiki/outputs/evolution/forge/<run>/forge_context.json
    context_markdown: wiki/outputs/evolution/forge/<run>/forge_context.md
    agent_prompt: wiki/outputs/evolution/forge/<run>/forge_agent_prompt.md
    agent_response: wiki/outputs/evolution/forge/<run>/forge_agent_response.json
    report: wiki/outputs/evolution/forge/<run>/forge_report.md
    apply_report_json: wiki/outputs/evolution/forge/<run>/forge_apply_report.json
    apply_report_markdown: wiki/outputs/evolution/forge/<run>/forge_apply_report.md
  contract:
    - deterministic tooling prepares skill content + workflow signal clusters
    - context includes recurring workflow signal patterns in addition to recent
      individual signals
    - a pluggable policy runtime proposes patch-prompt, add-check,
      adjust-handoff, or add-recovery proposals
    - validation requires cited skill file paths and line hints
    - default finalization applies validated patch-prompt, reorder-steps,
      rename-step, and create-skill mutations directly to skill files
    - patch-prompt, reorder-steps, and rename-step require a unique line hint
      or bounded section match and are skipped if markdown structure would break
    - every applied mutation records frontmatter provenance, an append-only
      SciEvolve Workflow Evolution Note, and an application ledger entry
    - --dry-run is a review posture, not a capability limit
    - --yolo enables high-confidence archive-skill and merge-skills operations
    - proposals target skills in i18n/en/skills/ and .claude/skills/
  signal_collection:
    - after run, record task signal if high rejection rate or skill backlog
  automation:
    workflow: .github/workflows/forge.yml
    config: config/forge.yml
    schedule: "23 19 * * 0"
    scheduled_yolo: user-configurable through config/forge.yml; manual dispatch
      inputs override config for a single run
    writeback: commits forge artifacts, proposal/application ledgers, sensed
      signals, and finalizer-declared skill mutations
    policy_runtime_gate: fail closed unless Claude Code Action auth or
      OpenAI-compatible LLM env is available
    automatic_sensing: scievolve-sense runs before context preparation
    claude_write_boundary: reject pre-finalization edits outside the generated
      response file; finalize the same prepared run with --run-dir
    staging: force-stage only finalizer-declared paths

morph:
  mode: agent-first
  default_behavior: dry-run/proposal-first; --apply enables template/prompt mutation
  artifacts:
    context_json: wiki/outputs/evolution/morph/<run>/morph_context.json
    context_markdown: wiki/outputs/evolution/morph/<run>/morph_context.md
    agent_prompt: wiki/outputs/evolution/morph/<run>/morph_agent_prompt.md
    agent_response: wiki/outputs/evolution/morph/<run>/morph_agent_response.json
    report: wiki/outputs/evolution/morph/<run>/morph_report.md
    apply_report_json: wiki/outputs/evolution/morph/<run>/morph_apply_report.json
    apply_report_markdown: wiki/outputs/evolution/morph/<run>/morph_apply_report.md
  contract:
    - deterministic tooling prepares template library + orchestration signal clusters
    - context includes recurring orchestration signal patterns in addition to recent
      individual signals
    - a pluggable policy runtime proposes patch-template, patch-prompt,
      add-verification-node, prune-branch, or specialize-template proposals
    - validation requires cited template file paths, operator names, and line hints
    - default finalization is dry-run; --apply applies validated patch-template,
      patch-prompt, add-verification-node, prune-branch, and create-template
      mutations directly to template YAMLs and operator prompt files
    - patch-template and patch-prompt require a unique line hint or bounded
      section match and are skipped if YAML/python structure would break
    - every applied mutation records frontmatter provenance, an append-only
      SciEvolve Orchestration Evolution Note, and an application ledger entry
    - --dry-run is a review posture, not a capability limit
    - --yolo enables high-confidence archive-template and merge-templates operations
    - proposals target templates in scidag/templates/ and prompts in scidag/operators/prompts.py
  signal_collection:
    - after run, record task signal if high rejection rate or template backlog
    - "cross-skill cascade: /dream and /forge may record orchestration signals
      when memory or workflow changes imply DAG adaptation"
  automation:
    workflow: .github/workflows/morph.yml
    config: config/morph.yml
    schedule: "13 17 * * 3"
    scheduled_yolo: user-configurable through config/morph.yml; manual dispatch
      inputs override config for a single run
    writeback: commits morph artifacts, proposal/application ledgers, sensed
      signals, and finalizer-declared template mutations
    policy_runtime_gate: fail closed unless Claude Code Action auth or
      OpenAI-compatible LLM env is available
    automatic_sensing: scievolve-sense runs before context preparation
    claude_write_boundary: reject pre-finalization edits outside the generated
      response file; finalize the same prepared run with --run-dir
    staging: force-stage only finalizer-declared paths

safety:
  posture_note: conservative defaults and opt-in yolo gates reflect standard
    deployment safety for agents that edit research memory and executable
    workflow text; they do not reduce SciEvolve's implemented self-evolution
    capability
  no_silent_mutation:
    - skills
    - runtime schemas
    - DAG templates
    - index.md
    - log.md
  dream:
    default_mode: auto-apply
    auto_apply:
      allowed_command: dream (default when --agent-response is provided)
      allowed_changes:
        - scievolve_memory_weight frontmatter
        - scievolve_consolidates_with frontmatter
        - scievolve_associations frontmatter
        - scievolve_last_dream frontmatter
        - scievolve_dream_notes frontmatter
        - tags frontmatter (append-only)
        - related_concepts / parent_topics / linked_ideas / parent_methods /
          key_papers / grounded_in frontmatter (append-only)
        - maturity frontmatter (forgetting -> deprecated only)
        - page body append-only SciEvolve Memory Evolution Note section
      requires:
        - validated agent proposal
        - medium or high confidence
        - existing target entity page
        - auditable application event
        - post-apply parse validation
        - downstream context rebuild
      opt_out: --propose-only
    yolo:
      allowed_command: dream --yolo
      allowed_changes:
        - page body merge (consolidation appends related page body into target)
        - page archive (consolidation archives related pages; forgetting archives target)
      requires:
        - validated agent proposal
        - high confidence only
        - explicit --yolo flag
        - auditable application event
        - post-apply parse validation
        - downstream context rebuild
  forge:
    default_mode: auto-apply
    auto_apply:
      allowed_command: forge (default when --agent-response is provided)
      allowed_changes:
        - skill prompt text patches (bounded section match or unique line hint)
        - skill step reorder (within existing step list)
        - skill step rename (within existing step list)
        - new skill creation in i18n/en/skills/ and .claude/skills/
        - append-only SciEvolve Workflow Evolution Note in SKILL.md
        - frontmatter provenance metadata in SKILL.md
      requires:
        - validated agent proposal
        - medium or high confidence
        - existing target skill file or create-skill target
        - auditable application event
        - post-apply parse validation
      opt_out: --dry-run
    yolo:
      allowed_command: forge --yolo
      allowed_changes:
        - skill archive (move to archive/skills/)
        - skill merge (absorb one skill into another)
      requires:
        - validated agent proposal
        - high confidence only
        - explicit --yolo flag
        - auditable application event
        - post-apply parse validation
  morph:
    default_mode: dry-run
    auto_apply:
      allowed_command: morph --apply
      allowed_changes:
        - DAG template YAML patches (bounded section match or unique line hint)
        - operator prompt patches in scidag/operators/prompts.py
        - add verification node to template
        - prune weak branch from template
        - specialize template (copy and adapt)
        - create new template skeleton in scidag/templates/<stage>/
        - append-only SciEvolve Orchestration Evolution Note in template YAML
        - frontmatter provenance metadata in template YAML
      requires:
        - validated agent proposal
        - medium or high confidence
        - existing target template file or create-template target
        - auditable application event
        - post-apply parse validation
      opt_out: --dry-run (default when no --apply is passed)
    yolo:
      allowed_command: morph --apply --yolo
      allowed_changes:
        - template archive (move to archive/templates/)
        - template merge (absorb one template into another)
      requires:
        - validated agent proposal
        - high confidence only
        - explicit --yolo flag
        - auditable application event
        - post-apply parse validation
  manual_apply_requires:
    - auditable artifact
    - visible diff or changed-path report
